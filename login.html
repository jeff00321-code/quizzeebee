<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>QuizzyBee 🐝 — Log In</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .message { margin-top: 15px; font-weight: bold; }
    .success { color: green; }
    .error { color: red; }
  </style>
</head>
<body>
  <div class="login-container">
    <h2>Log In to QuizzyBee</h2>
    <form id="loginForm">
      <input type="hidden" name="action" value="login">

      <label for="email">Email</label>
      <input type="email" id="email" name="email" required>

      <label for="password">Password</label>
      <input type="password" id="password" name="password" required>

      <button type="submit" class="btn-honey">Log In 🚀</button>
    </form>

    <div id="message" class="message"></div>

    <p>Don’t have an account? <a href="signup.html">Sign Up</a></p>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const messageDiv = document.getElementById('message');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const formData = new FormData(form);

      try {
        const response = await fetch('php/auth.php', {
          method: 'POST',
          body: formData
        });
        const result = await response.json();

        if (result.status === 'success') {
          messageDiv.textContent = "✅ Login successful!";
          messageDiv.className = "message success";
          form.reset();
        } else {
          messageDiv.textContent = "⚠️ " + (result.message || "Invalid credentials");
          messageDiv.className = "message error";
        }
      } catch (err) {
        messageDiv.textContent = "⚠️ Server error. Please try again.";
        messageDiv.className = "message error";
      }
    });
  </script>
</body>
</html>
