<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>QuizzyBee 🐝 — Sign Up</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Quick inline styles for messages */
    .message {
      margin-top: 15px;
      font-weight: bold;
    }
    .success { color: green; }
    .error { color: red; }
  </style>
</head>
<body>
  <div class="signup-container">
    <h2>Create Your QuizzyBee Account</h2>
    <form id="signupForm">
  <input type="hidden" name="action" value="register">
  <input type="text" name="name" required>
  <input type="email" name="email" required>
  <input type="password" name="password" required>
  <button type="submit">Sign Up 🚀</button>
</form>

    <!-- Message area -->
    <div id="message" class="message"></div>

    <p>Already have an account? <a href="login.html">Log In</a></p>
  </div>

  <script>
    const form = document.getElementById('signupForm');
    const messageDiv = document.getElementById('message');

    form.addEventListener('submit', async (e) => {
      e.preventDefault(); // stop normal form submission

      const formData = new FormData(form);

      try {
        const response = await fetch('php/auth.php', {
          method: 'POST',
          body: formData
        });
        const result = await response.json();

        if (result.status === 'success') {
          messageDiv.textContent = "🎉 Account created successfully!";
          messageDiv.className = "message success";
          form.reset();
        } else {
          messageDiv.textContent = "⚠️ " + (result.message || "Something went wrong");
          messageDiv.className = "message error";
        }
      } catch (err) {
        messageDiv.textContent = "⚠️ Server error. Please try again.";
        messageDiv.className = "message error";
      }
    });
  </script>
</body>
</html>
